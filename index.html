<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Unguard</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{min-height:100%;background:#0d1b2a}
body{font-family:'Zen Kaku Gothic New','Outfit',sans-serif;color:#f0f0f5;min-height:100dvh;max-width:420px;margin:0 auto;padding:16px 16px 80px;transition:background 0.8s ease;background:linear-gradient(180deg,#0d1b2a 0%,#1b2838 40%,#1a1a3e 100%)}

/* ===== STARS ===== */
#star-canvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;transition:opacity 1s ease}
body>*:not(#star-canvas){position:relative;z-index:1}

/* ===== CELESTIAL ===== */
.celestial{position:absolute;left:16px;top:4px;width:34px;height:34px;z-index:2;display:flex;align-items:center;justify-content:center}
.cel-icon{font-size:26px;transition:filter 0.5s ease;line-height:1}
.sun-rays{position:absolute;top:50%;left:50%;width:40px;height:40px;transform:translate(-50%,-50%);opacity:0;transition:opacity 0.8s ease;pointer-events:none}
.sun-rays span{position:absolute;display:block;width:2px;height:5px;background:#FFD700;border-radius:1px;top:0;left:50%;transform-origin:50% 20px}
.sun-rays span:nth-child(1){transform:rotate(0deg)}.sun-rays span:nth-child(2){transform:rotate(45deg)}.sun-rays span:nth-child(3){transform:rotate(90deg)}.sun-rays span:nth-child(4){transform:rotate(135deg)}.sun-rays span:nth-child(5){transform:rotate(180deg)}.sun-rays span:nth-child(6){transform:rotate(225deg)}.sun-rays span:nth-child(7){transform:rotate(270deg)}.sun-rays span:nth-child(8){transform:rotate(315deg)}

.hdr{text-align:center;padding:20px 0 12px;position:relative}
.hdr h1{font-family:'Outfit',sans-serif;font-size:26px;font-weight:700;letter-spacing:3px;background:linear-gradient(135deg,#FFD700,#FF6B6B,#7b61ff,#4a6fa5);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-transform:uppercase}
.hdr p{color:rgba(255,255,255,.5);font-size:11px;letter-spacing:2px;margin-top:4px}

.tabs{display:flex;background:rgba(10,15,30,.65);border-radius:12px;padding:4px;margin-bottom:18px;backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,.08)}
.tab{flex:1;padding:10px;text-align:center;font-size:12px;font-weight:500;color:rgba(255,255,255,.45);border:none;background:none;border-radius:9px;cursor:pointer;transition:.3s}
.tab.active{background:rgba(255,255,255,.12);color:#fff}

/* ===== CARD BASE — always dark, readable ===== */
.card-base{background:rgba(10,15,30,.75);border-radius:20px;padding:20px;margin-bottom:14px;backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.1);transition:border-color .4s}

/* ===== GUARD CHECK ===== */
.guard-card{text-align:center;padding:22px 20px}
.guard-q{font-size:15px;color:#f0f0f5;margin-bottom:16px;line-height:1.6;font-weight:500}
.guard-slider-wrap{position:relative;padding:0 8px}
.guard-slider{-webkit-appearance:none;appearance:none;width:100%;height:8px;border-radius:4px;background:linear-gradient(to right,#4a5a8a,#8888aa,#ffcc80);outline:none;cursor:pointer}
.guard-slider::-webkit-slider-thumb{-webkit-appearance:none;width:28px;height:28px;border-radius:50%;background:#fff;box-shadow:0 2px 8px rgba(0,0,0,.3);cursor:grab}
.guard-labels{display:flex;justify-content:space-between;font-size:10px;color:rgba(255,255,255,.4);margin-top:8px}
.guard-feel{margin-top:14px;font-size:12px;color:rgba(255,255,255,.5);transition:color .3s}

/* ===== MOOD ===== */
.card-label{font-size:11px;color:rgba(255,255,255,.5);letter-spacing:2px;text-transform:uppercase;margin-bottom:14px}
.mood-row{display:flex;gap:8px}
.mood-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;padding:12px 4px;background:rgba(255,255,255,.06);border:2px solid transparent;border-radius:14px;cursor:pointer;transition:.25s}
.mood-btn:active{transform:scale(.95)}
.mood-btn .m-emoji{font-size:22px}
.mood-btn .m-label{font-size:9px;color:rgba(255,255,255,.45);white-space:nowrap}
.mood-btn.sel{box-shadow:0 0 20px rgba(255,255,255,.05)}
.mood-btn[data-m="4"].sel{border-color:#FFD700;background:rgba(255,215,0,.1)}.mood-btn[data-m="4"].sel .m-label{color:#FFD700}
.mood-btn[data-m="3"].sel{border-color:#FF6B6B;background:rgba(255,107,107,.08)}.mood-btn[data-m="3"].sel .m-label{color:#FF6B6B}
.mood-btn[data-m="2"].sel{border-color:#66BB6A;background:rgba(102,187,106,.08)}.mood-btn[data-m="2"].sel .m-label{color:#66BB6A}
.mood-btn[data-m="1"].sel{border-color:#5C9CE6;background:rgba(92,156,230,.08)}.mood-btn[data-m="1"].sel .m-label{color:#5C9CE6}

/* ===== COLOR SLIDER ===== */
.color-card{display:none}
.color-card.show{display:block;animation:fadeUp .3s ease}
.color-hint{font-size:11px;color:rgba(255,255,255,.4);text-align:center;margin-bottom:14px}
.spectrum{position:relative;height:44px;border-radius:22px;cursor:pointer;touch-action:none}
.spectrum-thumb{position:absolute;top:50%;width:32px;height:32px;border-radius:50%;border:3px solid #fff;transform:translate(-50%,-50%);box-shadow:0 2px 10px rgba(0,0,0,.3);cursor:grab;transition:background .1s}
.color-preview{height:44px;border-radius:12px;margin-top:12px;display:flex;align-items:center;justify-content:center;font-size:11px;transition:background .15s}

/* ===== TEXT ===== */
.text-card textarea{width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:14px;color:#f0f0f5;font-family:'Zen Kaku Gothic New',sans-serif;font-size:15px;line-height:1.8;resize:none;outline:none;min-height:70px;transition:border-color .3s}
.text-card textarea:focus{border-color:rgba(255,255,255,.2)}
.text-card textarea::placeholder{color:rgba(255,255,255,.2)}

.good-card{background:rgba(10,15,30,.75);border-radius:16px;backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.1);padding:14px 18px;margin-bottom:14px;display:flex;align-items:center;gap:10px}
.good-card .g-icon{font-size:18px;flex-shrink:0}
.good-card input{flex:1;background:transparent;border:none;color:#f0f0f5;font-family:'Zen Kaku Gothic New',sans-serif;font-size:13px;outline:none}
.good-card input::placeholder{color:rgba(255,255,255,.18)}

.save-btn{width:100%;padding:16px;background:linear-gradient(135deg,#FFD700,#FF6B6B,#7b61ff);border:none;border-radius:14px;color:#fff;font-family:'Outfit',sans-serif;font-size:15px;font-weight:600;letter-spacing:2px;text-transform:uppercase;cursor:pointer;box-shadow:0 4px 20px rgba(255,107,107,.15);margin-bottom:12px;transition:.2s;opacity:.4}
.save-btn.ready{opacity:1}
.save-btn:active{transform:scale(.97)}

.reflect-btn{width:100%;padding:13px;background:rgba(10,15,30,.6);border:1px solid rgba(123,97,255,.25);border-radius:12px;color:#7b61ff;font-size:13px;cursor:pointer;margin-bottom:16px;text-align:center;backdrop-filter:blur(16px)}
.reflect-btn:active{transform:scale(.97)}

/* Reflect panel */
.reflect-panel{background:rgba(10,15,30,.85);border:1px solid rgba(123,97,255,.2);border-radius:20px;padding:18px;margin-bottom:16px;display:none;backdrop-filter:blur(20px)}
.reflect-panel.show{display:block;animation:fadeUp .3s ease}
.ref-date-row{display:flex;gap:8px;margin-bottom:14px}
.ref-date-btn{flex:1;padding:10px;text-align:center;background:rgba(255,255,255,.06);border:2px solid transparent;border-radius:10px;font-size:12px;color:rgba(255,255,255,.45);cursor:pointer;font-family:'Zen Kaku Gothic New',sans-serif}
.ref-date-btn.sel{border-color:#7b61ff;color:#7b61ff;background:rgba(123,97,255,.08)}
.ref-result-row{display:flex;gap:8px;margin-bottom:14px}
.ref-res-btn{flex:1;padding:12px 6px;text-align:center;background:rgba(255,255,255,.06);border:2px solid transparent;border-radius:12px;cursor:pointer;font-size:12px;color:rgba(255,255,255,.45);transition:.2s}
.ref-res-btn:active{transform:scale(.97)}
.ref-res-btn .r-emoji{font-size:20px;display:block;margin-bottom:4px}
.ref-res-btn.sel-good{border-color:#66BB6A;color:#66BB6A;background:rgba(102,187,106,.08)}
.ref-res-btn.sel-mid{border-color:#aaa;color:#aaa;background:rgba(170,170,170,.08)}
.ref-res-btn.sel-bad{border-color:#5C9CE6;color:#5C9CE6;background:rgba(92,156,230,.08)}
.reflect-panel textarea{width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:12px;color:#f0f0f5;font-family:'Zen Kaku Gothic New',sans-serif;font-size:13px;line-height:1.6;resize:none;outline:none;margin-bottom:12px}
.reflect-panel textarea:focus{border-color:rgba(255,255,255,.2)}
.reflect-panel textarea::placeholder{color:rgba(255,255,255,.18)}
.ref-save{width:100%;padding:14px;background:linear-gradient(135deg,#7b61ff,#5C9CE6);border:none;border-radius:12px;color:#fff;font-family:'Outfit',sans-serif;font-size:14px;font-weight:600;letter-spacing:1px;cursor:pointer}

/* Today mix */
.today-mix{display:none}
.today-mix.show{display:block;animation:fadeUp .3s ease}
.mix-label{font-size:11px;color:rgba(255,255,255,.45);letter-spacing:2px;text-transform:uppercase;margin-bottom:12px}
.mix-color{height:64px;border-radius:14px;margin-bottom:10px;display:flex;align-items:center;justify-content:center;font-size:12px;transition:background .4s}
.drops{display:flex;gap:6px;flex-wrap:wrap}
.drop{width:22px;height:22px;border-radius:50%;border:1px solid rgba(255,255,255,.1)}
.drop-info{font-size:10px;color:rgba(255,255,255,.3);margin-top:6px}

/* Toast */
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(100px);background:rgba(10,15,30,.9);border:1px solid rgba(102,187,106,.3);color:#66BB6A;padding:12px 24px;border-radius:30px;font-size:13px;z-index:100;transition:transform .4s cubic-bezier(.16,1,.3,1);pointer-events:none;backdrop-filter:blur(16px)}
.toast.show{transform:translateX(-50%) translateY(0)}

/* ===== CALENDAR ===== */
.cal-container{display:none}
.cal-container.show{display:block;animation:fadeUp .3s ease}
.cal-nav{display:flex;align-items:center;justify-content:center;gap:16px;margin-bottom:14px}
.cal-nav button{background:rgba(10,15,30,.7);border:1px solid rgba(255,255,255,.1);backdrop-filter:blur(12px);color:rgba(255,255,255,.6);width:36px;height:36px;border-radius:50%;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
.cal-nav button:active{transform:scale(.9)}
.cal-nav .cal-yr{font-family:'Outfit',sans-serif;font-size:18px;font-weight:700;letter-spacing:1px}
.cal-header{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:4px}
.cal-header span{font-size:9px;color:rgba(255,255,255,.5);text-align:center}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:16px}
.cal-day{aspect-ratio:1;border-radius:6px;background:rgba(255,255,255,.04);display:flex;align-items:center;justify-content:center;transition:background .3s}
.cal-day .dn{font-size:9px;color:rgba(255,255,255,.4)}
.cal-day.has .dn{color:rgba(255,255,255,.8)}
.cal-day.today{border:2px solid #7b61ff}
.cal-day.future{opacity:.3}
.cal-stats{display:flex;gap:8px;margin-bottom:16px}
.cal-stat{flex:1;background:rgba(10,15,30,.7);border-radius:12px;backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.08);padding:12px 8px;text-align:center}
.cal-stat .sn{font-family:'Outfit',sans-serif;font-size:18px;font-weight:700;color:#fff}
.cal-stat .sl{font-size:9px;color:rgba(255,255,255,.4);margin-top:2px}
.cal-day.has{cursor:pointer}
.cal-day.sel-day{outline:2px solid #FFD700;outline-offset:-2px}

/* Day detail popup */
.day-detail{background:rgba(10,15,30,.9);border-radius:16px;backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.12);padding:16px;margin-bottom:16px;display:none;animation:fadeUp .3s ease}
.day-detail.show{display:block}
.day-detail-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.day-detail-date{font-size:13px;font-weight:600;color:#fff}
.day-detail-close{background:none;border:none;color:rgba(255,255,255,.4);font-size:16px;cursor:pointer;padding:4px 8px}
.day-detail-entries{display:flex;flex-direction:column;gap:8px}
.dd-entry{display:flex;align-items:center;gap:10px;padding:8px 10px;background:rgba(255,255,255,.05);border-radius:10px}
.dd-color{width:14px;height:14px;border-radius:50%;flex-shrink:0;border:1px solid rgba(255,255,255,.1)}
.dd-info{flex:1;font-size:12px;color:rgba(255,255,255,.7)}
.dd-time{font-size:10px;color:rgba(255,255,255,.3)}
.dd-text{font-size:11px;color:rgba(255,255,255,.5);margin-top:2px}
.dd-none{font-size:12px;color:rgba(255,255,255,.3);text-align:center;padding:12px}

/* Custom modal */
.modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.6);z-index:200;display:none;align-items:center;justify-content:center;padding:24px}
.modal-overlay.show{display:flex}
.modal-box{background:#1a1a2e;border:1px solid rgba(255,255,255,.12);border-radius:18px;padding:24px;max-width:320px;width:100%;text-align:center}
.modal-msg{font-size:14px;color:#f0f0f5;margin-bottom:20px;line-height:1.6}
.modal-btns{display:flex;gap:10px}
.modal-btn{flex:1;padding:12px;border:none;border-radius:10px;font-size:13px;font-family:'Zen Kaku Gothic New',sans-serif;cursor:pointer;font-weight:500}
.modal-btn.cancel{background:rgba(255,255,255,.08);color:rgba(255,255,255,.6)}
.modal-btn.ok{background:linear-gradient(135deg,#FF6B6B,#7b61ff);color:#fff}
.modal-btn.single{background:rgba(255,255,255,.12);color:#fff}

/* Mood breakdown */
.mood-breakdown{background:rgba(10,15,30,.7);border-radius:14px;backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.08);padding:14px 16px;margin-bottom:16px}
.mood-breakdown .mb-title{font-size:10px;color:rgba(255,255,255,.4);letter-spacing:1px;text-transform:uppercase;margin-bottom:10px}
.mb-bar{height:10px;border-radius:5px;display:flex;overflow:hidden;margin-bottom:10px;background:rgba(255,255,255,.04)}
.mb-bar-seg{height:100%;transition:width .4s ease}
.mb-legend{display:flex;flex-wrap:wrap;gap:6px 14px}
.mb-item{display:flex;align-items:center;gap:5px;font-size:11px;color:rgba(255,255,255,.6)}
.mb-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* ===== HISTORY ===== */
.hist-container{display:none}
.hist-container.show{display:block;animation:fadeUp .3s ease}
.h-stats{display:flex;gap:8px;margin-bottom:16px}
.hs{flex:1;background:rgba(10,15,30,.7);border-radius:10px;backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.08);padding:10px 6px;text-align:center}
.hs .n{font-family:'Outfit',sans-serif;font-size:18px;font-weight:700;background:linear-gradient(135deg,#FFD700,#FF6B6B,#7b61ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hs .d{font-size:9px;color:rgba(255,255,255,.4);margin-top:2px}
.exp-bar{display:flex;gap:10px;margin-bottom:16px}
.exp-btn{flex:1;padding:12px;background:rgba(10,15,30,.7);border:1px solid rgba(255,255,255,.08);backdrop-filter:blur(12px);border-radius:10px;color:rgba(255,255,255,.5);font-size:12px;cursor:pointer}
.exp-btn:active{transform:scale(.97)}
.entry{background:rgba(10,15,30,.75);border-radius:16px;backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,.08);padding:16px 18px;margin-bottom:10px}
.entry-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.entry-time{font-size:11px;color:rgba(255,255,255,.35)}
.entry-meta{display:flex;align-items:center;gap:6px}
.entry-color{width:18px;height:18px;border-radius:50%;border:1px solid rgba(255,255,255,.1)}
.entry-guard{font-size:9px;color:rgba(255,255,255,.5);background:rgba(255,255,255,.06);padding:2px 8px;border-radius:10px}
.entry-text{font-size:13px;color:rgba(255,255,255,.8);line-height:1.7}
.entry-good{font-size:12px;color:#66BB6A;margin-top:8px;display:flex;align-items:center;gap:6px}
.entry-del{background:none;border:none;color:rgba(255,255,255,.25);font-size:10px;cursor:pointer;margin-top:6px;padding:4px 8px;border-radius:6px}
.reflect-entry{background:rgba(10,15,30,.75);border-radius:16px;backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,.08);padding:16px 18px;margin-bottom:10px;border-left:3px solid #7b61ff}
.empty{text-align:center;padding:40px;color:rgba(255,255,255,.4)}
.empty .ic{font-size:40px;margin-bottom:12px}

@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
</style>

</head>
<body>

<canvas id="star-canvas"></canvas>

<div class="hdr">
  <div class="celestial" id="celestial">
    <span class="cel-icon" id="cel-icon">🌙</span>
    <div class="sun-rays" id="sun-rays"><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span></div>
  </div>
  <h1>Unguard</h1>
  <p>構えを外す記録</p>
</div>

<div class="tabs">
  <button class="tab active" onclick="switchTab('record')">記録</button>
  <button class="tab" onclick="switchTab('calendar')">カレンダー</button>
  <button class="tab" onclick="switchTab('history')">履歴</button>
</div>

<!-- RECORD -->

<div id="tab-record">
  <div class="card-base guard-card" id="guard-card">
    <div class="guard-q" id="guard-q"></div>
    <div class="guard-slider-wrap">
      <input type="range" class="guard-slider" id="guard-slider" min="0" max="100" value="50" oninput="updateGuard(this.value)">
    </div>
    <div class="guard-labels"><span>力入ってる</span><span>自然体</span></div>
    <div class="guard-feel" id="guard-feel"></div>
  </div>

  <div class="card-base mood-card">
    <div class="card-label">今の気分</div>
    <div class="mood-row">
      <button class="mood-btn" data-m="4" onclick="pickMood(4)"><span class="m-emoji">🥳</span><span class="m-label">元気！</span></button>
      <button class="mood-btn" data-m="3" onclick="pickMood(3)"><span class="m-emoji">🙂</span><span class="m-label">ちょっと元気</span></button>
      <button class="mood-btn" data-m="2" onclick="pickMood(2)"><span class="m-emoji">😐</span><span class="m-label">普通</span></button>
      <button class="mood-btn" data-m="1" onclick="pickMood(1)"><span class="m-emoji">😢</span><span class="m-label">元気ない</span></button>
    </div>
  </div>

  <div class="card-base color-card" id="color-card">
    <div class="color-hint" id="color-hint"></div>
    <div class="spectrum" id="spectrum">
      <div class="spectrum-thumb" id="thumb"></div>
    </div>
    <div class="color-preview" id="color-preview"></div>
  </div>

  <div class="card-base text-card">
    <textarea id="f-text" placeholder="今、なにを思ってる？" rows="3"></textarea>
  </div>

  <div class="good-card">
    <span class="g-icon">✨</span>
    <input id="f-good" placeholder="ちょっとしたいいこと">
  </div>

<button class="save-btn" id="save-btn" onclick="saveEntry()">SAVE</button>

<button class="reflect-btn" onclick="toggleReflect()">🌙 振り返りを書く</button>

  <div class="reflect-panel" id="reflect-panel">
    <div class="card-label">いつの振り返り？</div>
    <div class="ref-date-row">
      <button class="ref-date-btn sel" id="ref-today" onclick="pickRefDate('today')">今日</button>
      <button class="ref-date-btn" id="ref-yesterday" onclick="pickRefDate('yesterday')">昨日</button>
    </div>
    <div class="card-label">実際どうだった？</div>
    <div class="ref-result-row">
      <button class="ref-res-btn" data-r="good" onclick="pickRefResult('good')"><span class="r-emoji">😊</span>良かった</button>
      <button class="ref-res-btn" data-r="mid" onclick="pickRefResult('mid')"><span class="r-emoji">😐</span>普通</button>
      <button class="ref-res-btn" data-r="bad" onclick="pickRefResult('bad')"><span class="r-emoji">😮‍💨</span>悪かった</button>
    </div>
    <textarea placeholder="振り返りメモ（任意）" id="f-reflect" rows="2"></textarea>
    <button class="ref-save" onclick="saveReflect()">振り返りを保存</button>
  </div>

  <div class="card-base today-mix" id="today-mix">
    <div class="mix-label">今日の色</div>
    <div class="mix-color" id="mix-color">まだ色がないよ</div>
    <div class="drops" id="drops"></div>
    <div class="drop-info" id="drop-info"></div>
  </div>
</div>

<!-- CALENDAR -->

<div class="cal-container" id="tab-calendar">
  <div class="cal-nav">
    <button onclick="calNav(-1)">◀</button>
    <span class="cal-yr" id="cal-label"></span>
    <button onclick="calNav(1)">▶</button>
  </div>
  <div class="cal-header"><span>月</span><span>火</span><span>水</span><span>木</span><span>金</span><span>土</span><span>日</span></div>
  <div class="cal-grid" id="cal-grid"></div>
  <div class="day-detail" id="day-detail">
    <div class="day-detail-head">
      <span class="day-detail-date" id="dd-date"></span>
      <button class="day-detail-close" onclick="closeDayDetail()">✕</button>
    </div>
    <div class="day-detail-entries" id="dd-entries"></div>
  </div>

  <div class="mood-breakdown" id="mood-breakdown" style="display:none">

    <div class="mb-bar" id="mb-bar"></div>

<!-- HISTORY -->

<div class="hist-container" id="tab-history">
  <div class="h-stats" id="h-stats"></div>
  <div class="exp-bar">
    <button class="exp-btn" onclick="exportCSV()">📄 CSV出力</button>
    <button class="exp-btn" onclick="clearAll()">🗑 全削除</button>
  </div>
  <div id="log-list"></div>
</div>

<div class="toast" id="toast">✓ 保存しました</div>
<div class="modal-overlay" id="modal"><div class="modal-box"><div class="modal-msg" id="modal-msg"></div><div class="modal-btns" id="modal-btns"></div></div></div>

<script>
const QUESTIONS=['今、力入ってる？','素の自分でいられてる？','心、開いてる？','リラックスできてる？','今、自然体？'];
const MOOD_LABELS={4:'元気！',3:'ちょっと元気',2:'普通',1:'元気ない'};
const MOOD_RANGES={
  4:{hint:'元気の色を選ぶ',stops:[{p:0,r:255,g:240,b:180},{p:.25,r:255,g:220,b:100},{p:.5,r:255,g:200,b:0},{p:.75,r:240,g:170,b:0},{p:1,r:200,g:140,b:0}],grad:'linear-gradient(to right,#FFF0B4,#FFDC64,#FFC800,#F0AA00,#C88C00)'},
  3:{hint:'あたたかさの色を選ぶ',stops:[{p:0,r:255,g:200,b:200},{p:.25,r:255,g:160,b:170},{p:.5,r:255,g:107,b:107},{p:.75,r:220,g:70,b:90},{p:1,r:170,g:40,b:60}],grad:'linear-gradient(to right,#FFC8C8,#FFA0AA,#FF6B6B,#DC465A,#AA283C)'},
  2:{hint:'穏やかさの色を選ぶ',stops:[{p:0,r:200,g:235,b:200},{p:.25,r:160,g:210,b:160},{p:.5,r:102,g:187,b:106},{p:.75,r:70,g:150,b:75},{p:1,r:40,g:110,b:50}],grad:'linear-gradient(to right,#C8EBC8,#A0D2A0,#66BB6A,#46964B,#286E32)'},
  1:{hint:'今の冷たさの色を選ぶ',stops:[{p:0,r:200,g:220,b:245},{p:.25,r:150,g:190,b:230},{p:.5,r:92,g:156,b:230},{p:.75,r:60,g:110,b:190},{p:1,r:30,g:60,b:130}],grad:'linear-gradient(to right,#C8DCF5,#96BEE6,#5C9CE6,#3C6EBE,#1E3C82)'}
};

let curMood=null,curColor=null,sliderPos=.5,guardVal=50,refDate='today',refResult=null;
let calM=new Date().getMonth(),calY=new Date().getFullYear();

function getE(){try{return JSON.parse(localStorage.getItem('unguard2')||'[]')}catch{return[]}}
function saveE(e){localStorage.setItem('unguard2',JSON.stringify(e))}
function dk(d){return`${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`}
function rgb(c){return`rgb(${c.r},${c.g},${c.b})`}
function lum(c){return(c.r*299+c.g*587+c.b*114)/1000}

// Guard question
function initGuard(){
  const q=QUESTIONS[Math.floor(Math.random()*QUESTIONS.length)];
  document.getElementById('guard-q').textContent=q;
  updateGuard(50);
}

function updateGuard(v){
  guardVal=parseInt(v);
  const feel=document.getElementById('guard-feel');
  const t=guardVal/100; // 0=guarded, 1=open
  
  // Sky background — ONLY body changes
  let bg;
  if(t<0.5){
    const p=t/0.5;
    const r1=13,g1=27,b1=42;
    const r2=80,g2=40,b2=80;
    const rm=Math.round(r1+(r2-r1)*p);
    const gm=Math.round(g1+(g2-g1)*p);
    const bm=Math.round(b1+(b2-b1)*p);
    const r3=20,g3=20,b3=50;
    const r4=180,g4=100,b4=60;
    const rb=Math.round(r3+(r4-r3)*p);
    const gb=Math.round(g3+(g4-g3)*p);
    const bb=Math.round(b3+(b4-b3)*p);
    bg=`linear-gradient(180deg,rgb(${rm},${gm},${bm}) 0%,rgb(${rb},${gb},${bb}) 100%)`;
  } else {
    const p=(t-0.5)/0.5;
    const r1=80,g1=40,b1=80;
    const r2=100,g2=180,b2=240;
    const rm=Math.round(r1+(r2-r1)*p);
    const gm=Math.round(g1+(g2-g1)*p);
    const bm=Math.round(b1+(b2-b1)*p);
    const r3=180,g3=100,b3=60;
    const r4=170,g4=210,b4=240;
    const rb=Math.round(r3+(r4-r3)*p);
    const gb=Math.round(g3+(g4-g3)*p);
    const bb=Math.round(b3+(b4-b3)*p);
    bg=`linear-gradient(180deg,rgb(${rm},${gm},${bm}) 0%,rgb(${rb},${gb},${bb}) 100%)`;
  }
  document.body.style.background=bg;
  // html background matches top of gradient for overscroll
  document.documentElement.style.background=t>0.7?'rgb(100,180,240)':'#0d1b2a';

  // Card border glow hint based on guard — subtle ambient effect
  const borderAlpha = 0.08 + t * 0.07;
  document.querySelectorAll('.card-base').forEach(el=>{
    el.style.borderColor=`rgba(255,255,255,${borderAlpha.toFixed(2)})`;
  });

  // === Moon → Sun transition ===
  const ci=document.getElementById('cel-icon');
  const sr=document.getElementById('sun-rays');
  
  if(t<0.25){
    ci.textContent='🌙';sr.style.opacity='0';
  } else if(t<0.45){
    ci.textContent='🌓';sr.style.opacity='0';
  } else if(t<0.6){
    ci.textContent='🌕';sr.style.opacity='0';
  } else if(t<0.75){
    ci.textContent='🌤️';sr.style.opacity='0.4';
  } else {
    ci.textContent='☀️';sr.style.opacity='0.8';
  }

  // === Stars ===
  const canvas=document.getElementById('star-canvas');
  canvas.style.opacity=String(Math.max(0,1-t*1.8));

  // Feel text
  if(guardVal<20){feel.textContent='ガチガチだね';feel.style.color='rgba(150,180,220,.8)'}
  else if(guardVal<40){feel.textContent='ちょっと力入ってるかも';feel.style.color='rgba(180,160,200,.8)'}
  else if(guardVal<60){feel.textContent='ぼちぼちだね';feel.style.color='rgba(255,200,150,.8)'}
  else if(guardVal<80){feel.textContent='わりと自然体';feel.style.color='rgba(200,220,240,.8)'}
  else{feel.textContent='開いてるね';feel.style.color='rgba(100,200,255,.8)'}
}

// Mood
function pickMood(m){
  curMood=m;
  document.querySelectorAll('.mood-btn').forEach(b=>b.classList.toggle('sel',parseInt(b.dataset.m)===m));
  const cc=document.getElementById('color-card');
  cc.classList.add('show');
  document.getElementById('color-hint').textContent=MOOD_RANGES[m].hint;
  document.getElementById('spectrum').style.background=MOOD_RANGES[m].grad;
  updateColor(sliderPos);
  document.getElementById('save-btn').classList.add('ready');
}

// Color
function lerp(stops,p){
  p=Math.max(0,Math.min(1,p));let i=0;
  for(let j=0;j<stops.length-1;j++){if(p>=stops[j].p&&p<=stops[j+1].p){i=j;break}}
  const s=stops[i],e=stops[i+1],t=(p-s.p)/(e.p-s.p);
  return{r:Math.round(s.r+(e.r-s.r)*t),g:Math.round(s.g+(e.g-s.g)*t),b:Math.round(s.b+(e.b-s.b)*t)};
}

function updateColor(p){
  if(!curMood)return;
  sliderPos=p;
  const c=lerp(MOOD_RANGES[curMood].stops,p);
  curColor=c;
  document.getElementById('thumb').style.left=(p*100)+'%';
  document.getElementById('thumb').style.background=rgb(c);
  const pv=document.getElementById('color-preview');
  pv.style.background=rgb(c);
  pv.style.color=lum(c)>140?'rgba(0,0,0,.35)':'rgba(255,255,255,.4)';
  pv.textContent='この色で記録する';
}

const spec=document.getElementById('spectrum');
function gp(e){const r=spec.getBoundingClientRect();const x=(e.touches?e.touches[0].clientX:e.clientX)-r.left;return Math.max(0,Math.min(1,x/r.width))}
spec.addEventListener('mousedown',e=>{updateColor(gp(e));sd()});
spec.addEventListener('touchstart',e=>{e.preventDefault();updateColor(gp(e));sd()},{passive:false});
function sd(){
  const mv=e=>{e.preventDefault();updateColor(gp(e))};
  const up=()=>{document.removeEventListener('mousemove',mv);document.removeEventListener('mouseup',up);document.removeEventListener('touchmove',mv);document.removeEventListener('touchend',up)};
  document.addEventListener('mousemove',mv);document.addEventListener('mouseup',up);
  document.addEventListener('touchmove',mv,{passive:false});document.addEventListener('touchend',up);
}

// Save
function saveEntry(){
  if(!curMood||!curColor)return;
  let saveDate,saveDateKey;
  if(overrideDate){
    const parts=overrideDate.split('-');
    saveDate=new Date(parseInt(parts[0]),parseInt(parts[1])-1,parseInt(parts[2]),12,0,0);
    saveDateKey=overrideDate;
  }else{
    saveDate=new Date();
    saveDateKey=dk(saveDate);
  }
  const e={id:Date.now(),date:saveDate.toISOString(),dateKey:saveDateKey,type:'log',mood:curMood,color:{...curColor},guard:guardVal,text:document.getElementById('f-text').value.trim(),good:document.getElementById('f-good').value.trim()};
  const entries=getE();entries.unshift(e);saveE(entries);
  document.getElementById('f-text').value='';document.getElementById('f-good').value='';
  // Reset override
  if(overrideDate){
    overrideDate=null;
    document.getElementById('save-btn').textContent='SAVE';
  }
  showTodayMix();showToast();
}

// Reflect
function toggleReflect(){document.getElementById('reflect-panel').classList.toggle('show')}
function pickRefDate(d){refDate=d;document.getElementById('ref-today').classList.toggle('sel',d==='today');document.getElementById('ref-yesterday').classList.toggle('sel',d==='yesterday')}
function pickRefResult(r){
  refResult=r;
  document.querySelectorAll('.ref-res-btn').forEach(b=>{b.classList.remove('sel-good','sel-mid','sel-bad');if(b.dataset.r===r)b.classList.add('sel-'+({good:'good',mid:'mid',bad:'bad'}[r]))});
}
function saveReflect(){
  const target=refDate==='yesterday'?new Date(Date.now()-86400000):new Date();
  const e={id:Date.now(),date:new Date().toISOString(),dateKey:dk(target),type:'reflect',actual:refResult||'mid',note:document.getElementById('f-reflect').value.trim()};
  const entries=getE();entries.unshift(e);saveE(entries);
  document.getElementById('f-reflect').value='';refResult=null;
  document.querySelectorAll('.ref-res-btn').forEach(b=>b.classList.remove('sel-good','sel-mid','sel-bad'));
  document.getElementById('reflect-panel').classList.remove('show');
  showToast();
}

function showToast(){const t=document.getElementById('toast');t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000)}

// Today mix
function showTodayMix(){
  const entries=getE().filter(e=>e.type==='log'&&e.dateKey===dk(new Date()));
  const div=document.getElementById('today-mix');
  if(!entries.length){div.classList.remove('show');return}
  div.classList.add('show');
  const avg={r:Math.round(entries.reduce((s,e)=>s+e.color.r,0)/entries.length),g:Math.round(entries.reduce((s,e)=>s+e.color.g,0)/entries.length),b:Math.round(entries.reduce((s,e)=>s+e.color.b,0)/entries.length)};
  const mc=document.getElementById('mix-color');
  mc.style.background=rgb(avg);mc.style.color=lum(avg)>140?'rgba(0,0,0,.3)':'rgba(255,255,255,.4)';mc.textContent=entries.length+'回分の色';
  document.getElementById('drops').innerHTML=entries.map(e=>`<div class="drop" style="background:${rgb(e.color)}"></div>`).join('');
  document.getElementById('drop-info').textContent=entries.length+'回記録した';
}

// Tabs
function switchTab(t){
  document.querySelectorAll('.tab').forEach((b,i)=>{const ts=['record','calendar','history'];b.classList.toggle('active',ts[i]===t)});
  document.getElementById('tab-record').style.display=t==='record'?'block':'none';
  document.getElementById('tab-calendar').classList.toggle('show',t==='calendar');
  document.getElementById('tab-history').classList.toggle('show',t==='history');
  if(t==='calendar')renderCal();if(t==='history')renderHist();
}

// Calendar
function calNav(d){calM+=d;if(calM>11){calM=0;calY++}if(calM<0){calM=11;calY--}closeDayDetail();renderCal()}
function mixForDay(key){
  const entries=getE().filter(e=>e.type==='log'&&e.dateKey===key);
  if(!entries.length)return null;
  const avgG=entries.reduce((s,e)=>s+e.guard,0)/entries.length;
  const darkFactor=0.7+avgG/100*0.3;
  return{r:Math.round(entries.reduce((s,e)=>s+e.color.r,0)/entries.length*darkFactor),g:Math.round(entries.reduce((s,e)=>s+e.color.g,0)/entries.length*darkFactor),b:Math.round(entries.reduce((s,e)=>s+e.color.b,0)/entries.length*darkFactor),n:entries.length};
}

function showDayDetail(key,day){
  const dd=document.getElementById('day-detail');
  const entries=getE().filter(e=>e.dateKey===key);
  document.getElementById('dd-date').textContent=`${calM+1}月${day}日の記録`;
  
  // Highlight selected day
  document.querySelectorAll('.cal-day.sel-day').forEach(el=>el.classList.remove('sel-day'));
  const sel=document.querySelector(`.cal-day[data-key="${key}"]`);
  if(sel)sel.classList.add('sel-day');

  // Don't allow future dates
  const keyParts=key.split('-');
  const keyDate=new Date(parseInt(keyParts[0]),parseInt(keyParts[1])-1,parseInt(keyParts[2]));
  const today=new Date();today.setHours(23,59,59,999);
  const isFuture=keyDate>today;
  
  const cont=document.getElementById('dd-entries');
  let html='';
  if(!entries.length){
    html='<div class="dd-none">この日は記録がないよ</div>';
  }else{
    const ML={4:'🥳 元気！',3:'🙂 ちょっと元気',2:'😐 普通',1:'😢 元気ない'};
    html=entries.map(e=>{
      const d=new Date(e.date);
      const tm=d.toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'});
      if(e.type==='reflect'){
        const rl={good:'😊 良かった',mid:'😐 普通',bad:'😮‍💨 悪かった'};
        return`<div class="dd-entry"><div class="dd-color" style="background:#7b61ff"></div><div class="dd-info"><span class="dd-time">${tm}</span> 🌙 振り返り — ${rl[e.actual]||''}${e.note?`<div class="dd-text">${esc(e.note)}</div>`:''}</div></div>`;
      }
      return`<div class="dd-entry"><div class="dd-color" style="background:${rgb(e.color)}"></div><div class="dd-info"><span class="dd-time">${tm}</span> ${ML[e.mood]||''}${e.text?`<div class="dd-text">${esc(e.text)}</div>`:''}${e.good?`<div class="dd-text" style="color:#66BB6A">✨ ${esc(e.good)}</div>`:''}</div></div>`;
    }).join('');
  }
  if(!isFuture){
    html+=`<button class="ref-save" style="margin-top:12px;font-size:12px;padding:10px" onclick="recordForDate('${key}')">📝 この日に記録する</button>`;
  }
  cont.innerHTML=html;
  dd.classList.add('show');
}

let overrideDate=null;
function recordForDate(key){
  overrideDate=key;
  closeDayDetail();
  switchTab('record');
  // Show indicator
  const sb=document.getElementById('save-btn');
  const parts=key.split('-');
  sb.textContent=`${parts[1]}月${parts[2]}日として保存`;
  showToast();
  document.getElementById('toast').querySelector?.('span')?.remove();
  // Scroll to top
  window.scrollTo({top:0,behavior:'smooth'});
}
function closeDayDetail(){
  document.getElementById('day-detail').classList.remove('show');
  document.querySelectorAll('.cal-day.sel-day').forEach(el=>el.classList.remove('sel-day'));
}

function renderCal(){
  const MS=['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  document.getElementById('cal-label').textContent=calY+'年 '+MS[calM];
  const grid=document.getElementById('cal-grid');
  const fd=new Date(calY,calM,1).getDay();
  const off=fd===0?6:fd-1;
  const dim=new Date(calY,calM+1,0).getDate();
  const today=new Date(),todayK=dk(today);
  let h='';
  for(let i=0;i<off;i++)h+='<div class="cal-day"></div>';
  for(let d=1;d<=dim;d++){
    const key=`${calY}-${calM+1}-${d}`;
    const dt=new Date(calY,calM,d);
    const isFu=dt>today,isTo=key===todayK;
    const mix=mixForDay(key);
    let cls='cal-day';let sty='';
    if(isTo)cls+=' today';if(isFu)cls+=' future';
    if(mix){cls+=' has';sty=`background:${rgb(mix)}`}
    h+=`<div class="${cls}" style="${sty}" onclick="showDayDetail('${key}',${d})" data-key="${key}"><span class="dn">${d}</span></div>`;
  }
  grid.innerHTML=h;
  const entries=getE().filter(e=>{const d=new Date(e.date);return d.getFullYear()===calY&&d.getMonth()===calM&&e.type==='log'});
  const st=document.getElementById('cal-stats');
  if(entries.length){
    const days=new Set(entries.map(e=>e.dateKey)).size;
    st.innerHTML=`<div class="cal-stat"><div class="sn">${entries.length}</div><div class="sl">記録数</div></div><div class="cal-stat"><div class="sn">${days}</div><div class="sl">記録日</div></div>`;
  }else st.innerHTML='';

  // Mood breakdown
  const mbd=document.getElementById('mood-breakdown');
  const mbBar=document.getElementById('mb-bar');
  const mbLeg=document.getElementById('mb-legend');
  if(entries.length){
    mbd.style.display='block';
    const counts={4:0,3:0,2:0,1:0};
    entries.forEach(e=>{if(counts[e.mood]!==undefined)counts[e.mood]++});
    const total=entries.length;
    const moodInfo=[
      {m:4,emoji:'🥳',label:'元気！',color:'#FFD700'},
      {m:3,emoji:'🙂',label:'ちょっと元気',color:'#FF6B6B'},
      {m:2,emoji:'😐',label:'普通',color:'#66BB6A'},
      {m:1,emoji:'😢',label:'元気ない',color:'#5C9CE6'}
    ];
    mbBar.innerHTML=moodInfo.filter(mi=>counts[mi.m]>0).map(mi=>`<div class="mb-bar-seg" style="width:${(counts[mi.m]/total*100).toFixed(1)}%;background:${mi.color}"></div>`).join('');
    mbLeg.innerHTML=moodInfo.filter(mi=>counts[mi.m]>0).map(mi=>`<div class="mb-item"><div class="mb-dot" style="background:${mi.color}"></div>${mi.emoji} ${counts[mi.m]}回</div>`).join('');
  }else{mbd.style.display='none'}
}

// History
function renderHist(){
  const entries=getE();const list=document.getElementById('log-list');const st=document.getElementById('h-stats');
  const logs=entries.filter(e=>e.type==='log');
  if(logs.length){
    const days=new Set(logs.map(e=>e.dateKey)).size;
    st.innerHTML=`<div class="hs"><div class="n">${entries.length}</div><div class="d">記録数</div></div><div class="hs"><div class="n">${days}</div><div class="d">記録日</div></div>`;
  }else st.innerHTML='';
  if(!entries.length){list.innerHTML='<div class="empty"><div class="ic">📝</div><p>まだ記録がないよ</p></div>';return}
  list.innerHTML=entries.map(e=>{
    const d=new Date(e.date);
    const ds=d.toLocaleDateString('ja-JP',{month:'short',day:'numeric',weekday:'short'})+' '+d.toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'});
    if(e.type==='reflect'){
      const rl={good:'良かった',mid:'普通',bad:'悪かった'};
      return`<div class="reflect-entry"><div class="entry-head"><span class="entry-time">${ds}</span><span style="font-size:10px;color:#7b61ff">🌙 振り返り（${e.dateKey}）</span></div>
        <div style="font-size:12px;color:rgba(255,255,255,.5);margin-bottom:4px">${rl[e.actual]||''}</div>
        ${e.note?`<div class="entry-text">${esc(e.note)}</div>`:''}
        <button class="entry-del" onclick="delE('${e.id}')">削除</button></div>`;
    }
    const gLabel=e.guard<30?'力入ってる':e.guard<45?'ちょっと力入ってる':e.guard<55?'':e.guard<70?'わりと自然体':'開いてる';
    return`<div class="entry"><div class="entry-head"><span class="entry-time">${ds}</span>
      <div class="entry-meta"><div class="entry-color" style="background:${rgb(e.color)}"></div>${gLabel?`<span class="entry-guard">${gLabel}</span>`:''}</div></div>
      ${e.text?`<div class="entry-text">${esc(e.text)}</div>`:''}
      ${e.good?`<div class="entry-good">✨ ${esc(e.good)}</div>`:''}
      <button class="entry-del" onclick="delE('${e.id}')">削除</button></div>`;
  }).join('');
}

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>')}

// Custom modal
function showModal(msg,onOk,okLabel,cancelLabel){
  const m=document.getElementById('modal');
  document.getElementById('modal-msg').textContent=msg;
  const btns=document.getElementById('modal-btns');
  if(cancelLabel){
    btns.innerHTML=`<button class="modal-btn cancel" id="m-cancel">${cancelLabel}</button><button class="modal-btn ok" id="m-ok">${okLabel||'OK'}</button>`;
    document.getElementById('m-cancel').onclick=()=>{m.classList.remove('show')};
    document.getElementById('m-ok').onclick=()=>{m.classList.remove('show');onOk()};
  }else{
    btns.innerHTML=`<button class="modal-btn single" id="m-ok">${okLabel||'OK'}</button>`;
    document.getElementById('m-ok').onclick=()=>{m.classList.remove('show');if(onOk)onOk()};
  }
  m.classList.add('show');
}

function delE(id){
  showModal('この記録を削除する？',()=>{
    saveE(getE().filter(e=>String(e.id)!==String(id)));renderHist();
  },'削除','やめる');
}
function clearAll(){
  showModal('全部消す？ 元に戻せないよ',()=>{
    saveE([]);renderHist();showToast();
  },'全削除','やめる');
}

function exportCSV(){
  const entries=getE();
  if(!entries.length){showModal('記録がないよ',null,'OK');return}
  const BOM='\uFEFF';
  const hdr='日時,日付キー,タイプ,気分,色R,色G,色B,構え度,テキスト,いいこと,振り返り結果,振り返りメモ';
  const rows=entries.map(e=>{
    const d=new Date(e.date);
    const ds=d.toLocaleDateString('ja-JP')+' '+d.toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'});
    if(e.type==='reflect')return[ds,e.dateKey,'振り返り','','','','','','','',{good:'良かった',mid:'普通',bad:'悪かった'}[e.actual]||'',csvE(e.note)].join(',');
    return[ds,e.dateKey,'記録',MOOD_LABELS[e.mood],e.color.r,e.color.g,e.color.b,e.guard,csvE(e.text),csvE(e.good),'',''].join(',');
  });
  const csv=BOM+hdr+'\n'+rows.join('\n');
  // Try Blob download first
  try{
    const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;a.download=`unguard_${new Date().toISOString().slice(0,10)}.csv`;
    a.style.display='none';
    document.body.appendChild(a);a.click();
    setTimeout(()=>{document.body.removeChild(a);URL.revokeObjectURL(url)},500);
    showToast();
  }catch(err){
    // Fallback: copy to clipboard
    navigator.clipboard.writeText(csv).then(()=>{
      showModal('CSVをクリップボードにコピーしたよ。メモ帳などに貼り付けて保存してね',null,'OK');
    }).catch(()=>{
      showModal('エクスポートに失敗したよ。Vercelにデプロイしてから試してみて',null,'OK');
    });
  }
}
function csvE(s){if(!s)return'';return'"'+s.replace(/"/g,'""').replace(/\n/g,' ')+'"'}

// Stars
function initStars(){
  const c=document.getElementById('star-canvas');
  const ctx=c.getContext('2d');
  c.width=window.innerWidth;c.height=window.innerHeight;
  const stars=[];
  for(let i=0;i<80;i++){
    stars.push({x:Math.random()*c.width,y:Math.random()*c.height,r:Math.random()*1.5+0.3,a:Math.random()*0.6+0.2,speed:Math.random()*0.008+0.003,phase:Math.random()*Math.PI*2});
  }
  function draw(){
    ctx.clearRect(0,0,c.width,c.height);
    const now=Date.now()*0.001;
    stars.forEach(s=>{
      const twinkle=s.a*(0.5+0.5*Math.sin(now*s.speed*60+s.phase));
      ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(255,255,240,${twinkle})`;ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  draw();
  window.addEventListener('resize',()=>{c.width=window.innerWidth;c.height=window.innerHeight});
}

// Init
initGuard();initStars();showTodayMix();
